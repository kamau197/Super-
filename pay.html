<!DOCTYPE html>
<html>
<head>
  <title>Pay Milestone</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    body { font-family: Arial; padding: 30px; }
    input, button { display:block; margin:10px 0; padding:8px; width:250px; }
  </style>
</head>
<body>

<h3>Pay Milestone</h3>

<input type="email" id="email" value="client@test.com">
<input type="number" id="amount" value="5000">
<input type="text" id="contract_id" value="CONTRACT_001">
<input type="text" id="milestone_id" value="MILESTONE_001">

<button onclick="payNow()">Pay Now</button>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
function payNow() {

    let handler = PaystackPop.setup({
        key: "pk_test_ecd2ebaf58c6a6683c1f0279b9d7788314bcd7f7", 
        email: document.getElementById("email").value,
        amount: document.getElementById("amount").value * 100,
        currency: "KES",

        callback: function(response) {

            // 🔥 THIS IS THE IMPORTANT PART
            fetch("https://super-oa8t.onrender.com/verify-payment", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    reference: response.reference,
                    email: document.getElementById("email").value,
                    amount: document.getElementById("amount").value,
                    contract_id: document.getElementById("contract").value,
                    milestone: document.getElementById("milestone").value
                })
            })
            .then(res => res.json())
            .then(data => {
                console.log(data);
                alert("Saved to DB");
            })
            .catch(err => {
                console.error(err);
                alert("Failed to save");
            });

        },

        onClose: function() {
            alert("Transaction cancelled");
        }
    });

    handler.openIframe();
}
</script>

</body>
</html>
