<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay Milestone</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 200px;
  background: #333;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding-top: 20px;
}
.sidebar a {
  color: #fff;
  padding: 15px 20px;
  text-decoration: none;
  display: block;
}
.sidebar a:hover {
  background: #444;
}

/* Main content */
.main {
  flex: 1;
  padding: 20px;
}
input, button {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  box-sizing: border-box;
}
button {
  cursor: pointer;
}
</style>
</head>
<body>

<div class="sidebar">
  <a href="/">Pay</a>
  <a href="/history">History</a>
</div>

<div class="main">
  <h1>Pay Milestone</h1>
  <form id="payForm">
    <input type="email" id="email" placeholder="Email" required />
    <input type="number" id="amount" placeholder="Amount (KES)" required />
    <input type="text" id="contract_id" placeholder="Contract ID" required />
    <input type="text" id="milestone_id" placeholder="Milestone ID" required />
    <input type="text" id="reference" placeholder="Paystack Reference" required />
    <button type="submit">Verify & Save Payment</button>
  </form>

  <div id="message"></div>
</div>

<script>
const form = document.getElementById("payForm");
const msg = document.getElementById("message");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    email: document.getElementById("email").value,
    amount: document.getElementById("amount").value,
    contract_id: document.getElementById("contract_id").value,
    milestone: document.getElementById("milestone").value,
    reference: document.getElementById("reference").value
  };

  try {
    const res = await fetch("/verify-payment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.success) msg.innerHTML = "✅ Payment verified and saved!";
    else msg.innerHTML = "❌ " + data.error;
  } catch (err) {
    msg.innerHTML = "❌ Server error";
    console.error(err);
  }
});
</script>

</body>
</html>
