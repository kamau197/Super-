<!DOCTYPE html>
<html>
<head>
  <title>Pay Milestone</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    body { font-family: Arial; margin:0; display:flex; }
    /* Sidebar */
    .sidebar {
      width: 200px;
      background: #0ba4db;
      color: white;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }
    .sidebar a {
      color: white;
      display:block;
      margin:10px 0;
      text-decoration:none;
    }
    .content {
      flex:1;
      padding:30px;
    }
    input, button { display:block; margin:10px 0; padding:8px; width:250px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>Menu</h3>
  <a href="pay.html">Pay Milestone</a>
  <a href="history.html">Payment History</a>
</div>

<div class="content">
  <h3>Pay Milestone</h3>

  <input type="email" id="email" value="client@test.com" placeholder="Email">
  <input type="number" id="amount" value="5000" placeholder="Amount">
  <input type="text" id="contract_id" value="CONTRACT_001" placeholder="Contract ID">
  <input type="text" id="milestone_id" value="MILESTONE_001" placeholder="Milestone ID">

  <button onclick="payNow()">Pay Now</button>
</div>

<script>
async function payNow() {
  const email = document.getElementById("email").value;
  const amount = document.getElementById("amount").value;
  const contract_id = document.getElementById("contract_id").value;
  const milestone = document.getElementById("milestone_id").value;

  let handler = PaystackPop.setup({
    key: "YOUR_PAYSTACK_PUBLIC_KEY",
    email,
    amount: amount * 100,
    currency: "KES",
    ref: "REF_" + Date.now(),
    metadata: { contract_id, milestone },
    callback: async function(response) {
      alert("Payment completed. Reference: " + response.reference);

      // Send verification to server
      const res = await fetch('/verify-payment', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          reference: response.reference,
          email,
          amount,
          contract_id,
          milestone,
          supremeId: "FINAL_PROJECT_001"
        })
      });
      const data = await res.json();
      if(data.success) alert("Payment saved successfully!");
      else alert("Error saving payment: " + data.error);
    }
  });
  handler.openIframe();
}
</script>

</body>
</html>
