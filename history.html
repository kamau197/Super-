<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment History</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 200px;
  background: #333;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding-top: 20px;
}
.sidebar a {
  color: #fff;
  padding: 15px 20px;
  text-decoration: none;
  display: block;
}
.sidebar a:hover {
  background: #444;
}

/* Main content */
.main {
  flex: 1;
  padding: 20px;
}
table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}
th, td {
  border: 1px solid #333;
  padding: 8px;
  text-align: left;
}
th {
  background: #eee;
}
</style>
</head>
<body>

<div class="sidebar">
  <a href="/">Pay</a>
  <a href="/history">History</a>
</div>

<div class="main">
  <h1>Payment History</h1>
  <table>
    <thead>
      <tr>
        <th>Reference ID</th>
        <th>Email</th>
        <th>Amount</th>
        <th>Contract ID</th>
        <th>Milestone ID</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="history"></tbody>
  </table>
</div>

<script>
async function loadHistory() {
  try {
    const res = await fetch("/payments");
    const data = await res.json();
    const tbody = document.getElementById("history");
    tbody.innerHTML = "";

    data.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.reference_id || "-"}</td>
        <td>${row.email || "-"}</td>
        <td>${row.amount || "-"}</td>
        <td>${row.contract_id || "-"}</td>
        <td>${row.milestone_id || "-"}</td>
        <td>${row.state || "-"}</td>
      `;
      tbody.appendChild(tr);
    });
  } catch(err) {
    console.error(err);
  }
}

loadHistory();
</script>

</body>
</html>
