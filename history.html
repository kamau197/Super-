<!DOCTYPE html>
<html>
<head>
  <title>Payment History</title>
  <style>
    body { font-family: Arial; margin:0; display:flex; }
    /* Sidebar */
    .sidebar {
      width: 200px;
      background: #0ba4db;
      color: white;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }
    .sidebar a {
      color: white;
      display:block;
      margin:10px 0;
      text-decoration:none;
    }
    .content { flex:1; padding:30px; }
    table { border-collapse: collapse; width:100%; }
    th, td { border:1px solid #ddd; padding:8px; }
    th { background:#0ba4db; color:white; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>Menu</h3>
  <a href="pay.html">Pay Milestone</a>
  <a href="history.html">Payment History</a>
</div>

<div class="content">
  <h3>Payment History (Audit)</h3>
  <button onclick="refreshHistory()">Refresh</button>
  <table>
    <thead>
      <tr>
        <th>Reference</th>
        <th>Contract</th>
        <th>Milestone</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
async function refreshHistory() {
  const res = await fetch('/get-history');
  const data = await res.json();

  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  data.forEach(p => {
    body.innerHTML += `
      <tr>
        <td>${p.reference}</td>
        <td>${p.contract_id || ''}</td>
        <td>${p.milestone_id || ''}</td>
        <td>${p.currency || 'KES'} ${p.amount}</td>
        <td>${p.status}</td>
        <td>${new Date(p.created_at).toLocaleString()}</td>
      </tr>
    `;
  });
}

// Load immediately
refreshHistory();
</script>

</body>
</html>
